<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap');

        body {
            margin: 0;
            background-color: #0a0a0a; /* Noir profond */
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            text-align: center;
            padding: 40px;
            border: 1px solid #222;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            border-radius: 20px;
            max-width: 500px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: #888;
            margin-bottom: 30px;
        }

        .cta {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: all 0.4s ease;
        }

        .cta:hover {
            background-color: #fff;
            color: #000;
        }

        /* Petit effet de reflet/aura subtile */
        .aura {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <h1>House of Laura</h1>
        <p>L'excellence derrière l'écran.</p>
        <a href="https://www.twitch.tv/houseoflaura" class="cta">Entrer</a>
    </div>
</body>
</html>
